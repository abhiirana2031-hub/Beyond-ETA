services:
  # BACKEND SERVICE
  - type: web
    name: beyond-eta-backend
    env: python
    plan: free
    region: oregon
    rootDir: backend/
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MAPBOX_TOKEN
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: beyond_eta

  # FRONTEND SERVICE
  - type: web
    name: beyond-eta-frontend
    env: static
    rootDir: frontend/
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    staticPublishPath: ./build
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: REACT_APP_MAPBOX_TOKEN
        sync: false
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: beyond-eta-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
